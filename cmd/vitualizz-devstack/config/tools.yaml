  # =====================================================================
  # CLI TOOLS: GLOW
  # =====================================================================
  - name: glow
    category: tools
    install:
      debian: |
        curl -sSLo /tmp/glow.deb https://github.com/charmbracelet/glow/releases/latest/download/glow_linux_amd64.deb
        sudo dpkg -i /tmp/glow.deb
        rm /tmp/glow.deb
      arch: sudo pacman -S --noconfirm glow
      fedora: sudo dnf install -y glow
      alpine: |
        GLOW_VERSION=$(curl -s https://api.github.com/repos/charmbracelet/glow/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
        curl -sSLo /tmp/glow.tar.gz "https://github.com/charmbracelet/glow/releases/download/v${GLOW_VERSION}/glow_${GLOW_VERSION}_Linux_x86_64.tar.gz"
        tar xf /tmp/glow.tar.gz -C /tmp
        mv /tmp/glow /usr/local/bin/
        rm -rf /tmp/glow.tar.gz
      brew: brew install glow
    uninstall:
      debian: sudo dpkg -r glow
      arch: sudo pacman -R --noconfirm glow
      fedora: sudo dnf remove -y glow
      brew: brew uninstall glow
    check: glow --version
    description: "Markdown renderizado en la terminal"
    enabled: true
    required: false
    source_url: https://github.com/charmbracelet/glow


