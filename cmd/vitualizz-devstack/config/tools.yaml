# =============================================================================
# EnvSetup Tools Configuration
# =============================================================================
# Distro detection order: arch > debian > fedora > suse > alpine > brew
# Install commands per distro are executed in order until one succeeds
# =============================================================================

themes:
  - name: vitualizz
    display_name: "Vitualizz"
    category: theme
    colors:
      background: "0x1A1B26"
      foreground: "0xC0CAF5"
      normal:
        black: "0x414868"
        red: "0xF7768E"
        green: "0x73DACA"
        yellow: "0xE0AF68"
        blue: "0x7AA2F7"
        magenta: "0xBB9AF7"
        cyan: "0x7DCFFF"
        white: "0xC0CAF5"
      bright:
        black: "0x414868"
        red: "0xF7768E"
        green: "0x73DACA"
        yellow: "0xE0AF68"
        blue: "0x7AA2F7"
        magenta: "0xBB9AF7"
        cyan: "0x7DCFFF"
        white: "0xC0CAF5"


# =============================================================================
# Tools Definition
# =============================================================================
# Fields:
#   - name: unique identifier
#   - category: terminal | shell | editor | tools | container | fonts
#   - depends_on: list of tools that must be installed first (order matters)
#   - install: map of distro -> install command (executed in order until success)
#   - uninstall: map of distro -> uninstall command (optional)
#   - check: command to verify installation
#   - version: optional version constraint (not enforced, for display)
#   - description: human-readable description
#   - source_url: reference link
#   - alternatives: list of alternative names (e.g., nvim, vim)
#   - enabled: shown in UI by default
#   - required: must be installed (no option to disable)
# =============================================================================

tools:
  # =====================================================================
  # TERMINAL
  # =====================================================================
  - name: kitty
    category: terminal
    install:
      arch: sudo pacman -S --noconfirm kitty
      debian: sudo apt-get install -y kitty
      fedora: sudo dnf install -y kitty
      suse: sudo zypper install -y kitty
      alpine: apk add kitty
      brew: brew install kitty
      fallback: curl -L https://sw.kovidgoyal.net/kitty/installer.sh | sh /dev/stdin launch=n
    uninstall:
      arch: sudo pacman -R --noconfirm kitty
      debian: sudo apt-get remove -y kitty
      fedora: sudo dnf remove -y kitty
    check: kitty --version
    description: "Emulador de terminal rápido"
    enabled: true
    required: true

  - name: kitty-config
    category: terminal
    depends_on: [kitty]
    install:
      all: |
        mkdir -p ~/.config/kitty
        cp -r $DEVSTACK_CONFIG/kitty/* ~/.config/kitty/
    uninstall:
      all: rm -rf ~/.config/kitty
    check: test -f ~/.config/kitty/kitty.conf
    description: "Config Tokyo Night para Kitty"
    enabled: true
    required: false

  # =====================================================================
  # SHELL
  # =====================================================================
  - name: zsh
    category: shell
    install:
      debian: sudo apt-get install -y zsh
      arch: sudo pacman -S --noconfirm zsh
      fedora: sudo dnf install -y zsh
      suse: sudo zypper install -y zsh
    uninstall:
      debian: sudo apt-get remove -y zsh
      arch: sudo pacman -R --noconfirm zsh
      fedora: sudo dnf remove -y zsh
    check: zsh --version
    description: "Shell Zsh"
    enabled: true
    required: true
    alternatives: [bash, fish]

  - name: oh-my-zsh
    category: shell
    depends_on: [zsh]
    install:
      all: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
    uninstall:
      all: uninstall_oh_my_zsh 2>/dev/null || rm -rf ~/.oh-my-zsh
    check: test -d ~/.oh-my-zsh
    description: "Framework para Zsh"
    enabled: true
    required: false

  - name: powerlevel10k
    category: shell
    depends_on: [oh-my-zsh]
    install:
      all: git clone --depth=1 https://github.com/romkatv/powerlevel10k.git ~/.oh-my-zsh/custom/themes/powerlevel10k
    uninstall:
      all: rm -rf ~/.oh-my-zsh/custom/themes/powerlevel10k
    check: test -d ~/.oh-my-zsh/custom/themes/powerlevel10k
    description: "Tema Powerlevel10k para Zsh"
    enabled: true
    required: false

  - name: zsh-config
    category: shell
    depends_on: [zsh, oh-my-zsh]
    install:
      all: |
        cp $DEVSTACK_CONFIG/zsh/zshrc ~/.zshrc
        cp $DEVSTACK_CONFIG/zsh/zshenv ~/.zshenv
        cp $DEVSTACK_CONFIG/zsh/zprofile ~/.zprofile
    uninstall:
      all: rm -f ~/.zshrc ~/.zshenv ~/.zprofile
    check: test -f ~/.zshrc
    description: "Configuración personal para Zsh"
    enabled: true
    required: false

  - name: starship
    category: shell
    depends_on: [zsh]
    install:
      alpine: apk add --no-cache starship
      fallback: curl -sS https://starship.rs/install.sh | sh -s -- --yes --force
    uninstall:
      all: rm -f ~/.local/bin/starship
    check: starship --version
    description: "Prompt moderno para Shell"
    enabled: true
    required: false
    source_url: https://starship.rs

  # =====================================================================
  # EDITOR
  # =====================================================================
  - name: neovim
    category: editor
    install:
      debian: sudo apt-get install -y neovim
      arch: sudo pacman -S --noconfirm neovim
      fedora: sudo dnf install -y neovim
      alpine: apk add --no-cache neovim
      fallback: |
        curl -LO https://github.com/neovim/neovim/releases/latest/download/nvim-linux64.tar.gz
        sudo tar xzf nvim-linux64.tar.gz -C /opt
        sudo ln -sf /opt/nvim-linux64/bin/nvim /usr/local/bin/nvim
        rm -f nvim-linux64.tar.gz
    uninstall:
      debian: sudo apt-get remove -y neovim
      arch: sudo pacman -R --noconfirm neovim
      fedora: sudo dnf remove -y neovim
      fallback: sudo rm -f /usr/local/bin/nvim
    check: nvim --version
    description: "Editor de texto (Neovim)"
    enabled: true
    required: true
    source_url: https://github.com/neovim/neovim

  # =====================================================================
  # VERSION MANAGER
  # =====================================================================
  - name: mise
    category: tools
    install:
      alpine: |
        apk add --no-cache tar xz
        curl -sSL https://github.com/jdx/mise/releases/latest/download/mise-latest-linux-x64-musl.tar.gz | tar xz -C /usr/local/bin --strip-components=1
      fallback: curl https://mise.run | MISE_YES=1 sh
    uninstall:
      all: rm -rf ~/.local/share/mise
    check: mise --version
    description: "Gestor de versiones (Rust, Node, Python)"
    enabled: true
    required: true
    source_url: https://mise.jdx.dev

  # =====================================================================
  # RUST TOOLCHAIN
  # =====================================================================
  - name: rustup
    category: tools
    install:
      alpine: apk add --no-cache rustup
      all: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- --yes
    uninstall:
      all: rustup self uninstall -y
    check: rustup --version
    description: "Gestor de versiones de Rust y Cargo"
    enabled: true
    required: false
    source_url: https://rustup.rs

  # =====================================================================
  # AI
  # =====================================================================
  - name: opencode
    category: tools
    install:
      all: curl -sSL https://get.opencode.ai | sh -s -- --yes
    uninstall:
      all: rm -f ~/.opencode/bin/opencode
    check: opencode --version
    description: "Asistente de IA para programar"
    enabled: true
    required: false
    source_url: https://opencode.ai

  # =====================================================================
  # CONTAINERS
  # =====================================================================
  - name: docker
    category: container
    install:
      all: curl -fsSL https://get.docker.com | sh
    uninstall:
      debian: sudo apt-get remove -y docker-ce
      arch: sudo pacman -R --noconfirm docker
      fedora: sudo dnf remove -y docker-ce
    check: docker --version
    description: "Plataforma de contenedores"
    enabled: true
    required: false
    source_url: https://docker.com

  - name: docker-compose
    category: container
    depends_on: [docker]
    install:
      debian: |
        sudo apt-get update
        sudo apt-get install -y docker-compose-plugin
      arch: |
        sudo pacman -S --noconfirm docker-compose
      fedora: |
        sudo dnf install -y docker-compose
      fallback: |
        sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose
    uninstall:
      debian: sudo apt-get remove -y docker-compose-plugin
      arch: sudo pacman -R --noconfirm docker-compose
      fedora: sudo dnf remove -y docker-compose
      fallback: sudo rm -f /usr/local/bin/docker-compose
    check: docker compose version
    description: "Plugin Docker Compose"
    enabled: true
    required: false
    source_url: https://github.com/docker/compose

  # =====================================================================
  # CLI TOOLS: FUZZY FINDER
  # =====================================================================
  - name: fzf
    category: tools
    install:
      alpine: apk add --no-cache fzf
      debian: sudo apt-get install -y fzf
      arch: sudo pacman -S --noconfirm fzf
      fedora: sudo dnf install -y fzf
      fallback: |
        git clone --depth 1 https://github.com/junegunn/fzf.git ~/.fzf
        yes | ~/.fzf/install --bin
    uninstall:
      all: rm -rf ~/.fzf
    check: fzf --version
    description: "Buscador difuso interactivo"
    enabled: true
    required: false
    source_url: https://github.com/junegunn/fzf

  # =====================================================================
  # CLI TOOLS: BAT
  # =====================================================================
  - name: bat
    category: tools
    install:
      debian: sudo apt-get install -y bat
      arch: sudo pacman -S --noconfirm bat
      fedora: sudo dnf install -y bat
      alpine: apk add --no-cache bat
      fallback: cargo install bat
    uninstall:
      debian: sudo apt-get remove -y bat
      arch: sudo pacman -R --noconfirm bat
      fedora: sudo dnf remove -y bat
      fallback: cargo uninstall bat
    check: bat --version
    description: "cat con resaltado de sintaxis"
    enabled: true
    required: false
    source_url: https://github.com/sharkdp/bat

  # =====================================================================
  # CLI TOOLS: EZA
  # =====================================================================
  - name: eza
    category: tools
    install:
      arch: sudo pacman -S --noconfirm eza
      fedora: |
        sudo rpmfusion-free=$(grep -q '^enabled=1' /etc/fedora-release && echo "--enablerepo=rpmfusion_free" || echo "")
        sudo dnf install -y eza
      alpine: apk add --no-cache eza
      fallback: cargo install eza
    uninstall:
      arch: sudo pacman -R --noconfirm eza
      fedora: sudo dnf remove -y eza
      fallback: cargo uninstall eza
    check: eza --version
    description: "Reemplazo moderno de ls"
    enabled: true
    required: false
    source_url: https://github.com/eza-community/eza

  # =====================================================================
  # CLI TOOLS: YAZI
  # =====================================================================
  - name: yazi
    category: tools
    install:
      alpine: |
        apk add --no-cache unzip
        curl -sSLo /tmp/yazi.zip https://github.com/sxyazi/yazi/releases/latest/download/yazi-x86_64-unknown-linux-musl.zip
        unzip -q /tmp/yazi.zip -d /tmp/yazi-tmp
        mv /tmp/yazi-tmp/yazi-x86_64-unknown-linux-musl/yazi /usr/local/bin/
        mv /tmp/yazi-tmp/yazi-x86_64-unknown-linux-musl/ya /usr/local/bin/
        rm -rf /tmp/yazi.zip /tmp/yazi-tmp
      all: cargo install yazi-fm --locked
    uninstall:
      all: cargo uninstall yazi-fm
    check: ya --version
    description: "Gestor de archivos en terminal"
    enabled: true
    required: false
    source_url: https://github.com/sxyazi/yazi

  # =====================================================================
  # CLI TOOLS: JQ
  # =====================================================================
  - name: jq
    category: tools
    install:
      debian: sudo apt-get install -y jq
      arch: sudo pacman -S --noconfirm jq
      fedora: sudo dnf install -y jq
      suse: sudo zypper install -y jq
      alpine: apk add --no-cache jq
      brew: brew install jq
    uninstall:
      debian: sudo apt-get remove -y jq
      arch: sudo pacman -R --noconfirm jq
      fedora: sudo dnf remove -y jq
      suse: sudo zypper remove -y jq
      brew: brew uninstall jq
    check: jq --version
    description: "Procesador de JSON"
    enabled: true
    required: false

  # =====================================================================
  # CLI TOOLS: LAZYGIT
  # =====================================================================
  - name: lazygit
    category: tools
    install:
      alpine: |
        LAZYGIT_VERSION=$(curl -s https://api.github.com/repos/jesseduffield/lazygit/releases/latest | grep '"tag_name":' | cut -d'"' -f4 | tr -d 'v')
        curl -Lo /tmp/lazygit.tar.gz "https://github.com/jesseduffield/lazygit/releases/latest/download/lazygit_${LAZYGIT_VERSION}_Linux_x86_64.tar.gz"
        tar xf /tmp/lazygit.tar.gz -C /usr/local/bin lazygit
        rm /tmp/lazygit.tar.gz
      all: curl -sSL https://raw.githubusercontent.com/jesseduffield/lazygit/master/scripts/install.sh | sh
    uninstall:
      all: rm -f ~/.local/bin/lazygit
    check: lazygit --version
    description: "UI visual para Git"
    enabled: true
    required: false
    source_url: https://github.com/jesseduffield/lazygit

  # =====================================================================
  # CLI TOOLS: DIRENV
  # =====================================================================
  - name: direnv
    category: tools
    install:
      debian: sudo apt-get install -y direnv
      arch: sudo pacman -S --noconfirm direnv
      fedora: sudo dnf install -y direnv
      suse: sudo zypper install -y direnv
      alpine: apk add --no-cache direnv
      brew: brew install direnv
    uninstall:
      debian: sudo apt-get remove -y direnv
      arch: sudo pacman -R --noconfirm direnv
      fedora: sudo dnf remove -y direnv
      suse: sudo zypper remove -y direnv
      brew: brew uninstall direnv
    check: direnv --version
    description: "Variables de entorno por directorio"
    enabled: true
    required: false
    source_url: https://github.com/direnv/direnv

  # =====================================================================
  # CLI TOOLS: ZOXIDE
  # =====================================================================
  - name: zoxide
    category: tools
    install:
      alpine: apk add --no-cache zoxide
      fallback: curl -sSL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh -s -- --yes
    uninstall:
      all: rm -f ~/.local/bin/zoxide
    check: zoxide --version
    description: "cd inteligente que aprende"
    enabled: true
    required: false
    source_url: https://github.com/ajeetdsouza/zoxide

  # =====================================================================
  # CLI TOOLS: BOTTOM
  # =====================================================================
  - name: bottom
    category: tools
    install:
      alpine: |
        curl -sSL https://github.com/ClementTsang/bottom/releases/latest/download/bottom_x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin btm
      all: cargo install bottom --locked
    uninstall:
      all: cargo uninstall bottom
    check: btm --version
    description: "Monitor del sistema"
    enabled: true
    required: false
    source_url: https://github.com/ClementTsang/bottom

  # =====================================================================
  # CLI TOOLS: GH (GitHub CLI)
  # =====================================================================
  - name: gh
    category: tools
    install:
      debian: |
        type -p curl >/dev/null || sudo apt-get install -y curl
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt-get update
        sudo apt-get install -y gh
      arch: sudo pacman -S --noconfirm github-cli
      fedora: sudo dnf install -y gh
      alpine: apk add --no-cache github-cli
      brew: brew install gh
    uninstall:
      debian: sudo apt-get remove -y gh
      arch: sudo pacman -R --noconfirm github-cli
      fedora: sudo dnf remove -y gh
      brew: brew uninstall gh
    check: gh --version
    description: "CLI de GitHub"
    enabled: true
    required: false
    source_url: https://github.com/cli/cli

  # =====================================================================
  # CLI TOOLS: UV (Python)
  # =====================================================================
  - name: uv
    category: tools
    install:
      alpine: apk add --no-cache uv
      all: curl -LsSf https://astral.sh/uv/install.sh | sh -s -- --yes
    uninstall:
      all: rm -f ~/.local/bin/uv
    check: uv --version
    description: "Gestor de paquetes Python ultrarrápido"
    enabled: true
    required: false
    source_url: https://github.com/astral-sh/uv

  # =====================================================================
  # CLI TOOLS: HTTPIE
  # =====================================================================
  - name: httpie
    category: tools
    install:
      alpine: |
        apk add --no-cache python3 py3-pip
        pip3 install --break-system-packages httpie
      all: pip install httpie
    uninstall:
      all: pip uninstall httpie -y
    check: http --version
    description: "Cliente HTTP amigable"
    enabled: true
    required: false
    source_url: https://github.com/httpie/httpie

  # =====================================================================
  # CLI TOOLS: YQ (YAML)
  # =====================================================================
  - name: yq
    category: tools
    install:
      debian: |
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq
      arch: yay -S --noconfirm yq
      fedora: sudo dnf install -y yq
      alpine: |
        wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        chmod +x /usr/local/bin/yq
      brew: brew install yq
    uninstall:
      debian: sudo rm -f /usr/local/bin/yq
      arch: sudo pacman -R --noconfirm yq
      fedora: sudo dnf remove -y yq
      brew: brew uninstall yq
    check: yq --version
    description: "Procesador de YAML"
    enabled: true
    required: false
    source_url: https://github.com/mikefarah/yq

  # =====================================================================
  # CLI TOOLS: RIPGREP
  # =====================================================================
  - name: ripgrep
    category: tools
    install:
      debian: sudo apt-get install -y ripgrep
      arch: sudo pacman -S --noconfirm ripgrep
      fedora: sudo dnf install -y ripgrep
      alpine: apk add --no-cache ripgrep
      brew: brew install ripgrep
    uninstall:
      debian: sudo apt-get remove -y ripgrep
      arch: sudo pacman -R --noconfirm ripgrep
      fedora: sudo dnf remove -y ripgrep
      brew: brew uninstall ripgrep
    check: rg --version
    description: "Búsqueda de texto ultrarrápida (rg)"
    enabled: true
    required: false
    source_url: https://github.com/BurntSushi/ripgrep

  # =====================================================================
  # CLI TOOLS: FD
  # =====================================================================
  - name: fd
    category: tools
    install:
      debian: |
        sudo apt-get install -y fd-find
        sudo ln -sf $(which fdfind) /usr/local/bin/fd 2>/dev/null || true
      arch: sudo pacman -S --noconfirm fd
      fedora: sudo dnf install -y fd-find
      alpine: apk add --no-cache fd
      brew: brew install fd
    uninstall:
      debian: sudo apt-get remove -y fd-find
      arch: sudo pacman -R --noconfirm fd
      fedora: sudo dnf remove -y fd-find
      brew: brew uninstall fd
    check: fd --version
    description: "Buscador de archivos moderno"
    enabled: true
    required: false
    source_url: https://github.com/sharkdp/fd

  # =====================================================================
  # CLI TOOLS: SD
  # =====================================================================
  - name: sd
    category: tools
    depends_on: [rustup]
    install:
      alpine: apk add --no-cache sd
      fallback: . "$HOME/.cargo/env" && cargo install sd --quiet
    uninstall:
      all: . "$HOME/.cargo/env" && cargo uninstall sd
    check: sd --version
    description: "Reemplazo moderno de sed"
    enabled: true
    required: false
    source_url: https://github.com/chmln/sd

  # =====================================================================
  # CLI TOOLS: DELTA
  # =====================================================================
  - name: delta
    category: tools
    install:
      debian: |
        DELTA_VERSION=$(curl -s https://api.github.com/repos/dandavison/delta/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
        curl -Lo /tmp/delta.deb "https://github.com/dandavison/delta/releases/download/${DELTA_VERSION}/git-delta_${DELTA_VERSION}_amd64.deb"
        sudo dpkg -i /tmp/delta.deb
        rm /tmp/delta.deb
      arch: sudo pacman -S --noconfirm git-delta
      fedora: sudo dnf install -y git-delta
      alpine: |
        DELTA_VERSION=$(curl -s https://api.github.com/repos/dandavison/delta/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
        curl -sSLo /tmp/delta.tar.gz "https://github.com/dandavison/delta/releases/download/${DELTA_VERSION}/delta-${DELTA_VERSION}-x86_64-unknown-linux-musl.tar.gz"
        tar xf /tmp/delta.tar.gz -C /tmp
        mv "/tmp/delta-${DELTA_VERSION}-x86_64-unknown-linux-musl/delta" /usr/local/bin/
        rm -rf /tmp/delta.tar.gz "/tmp/delta-${DELTA_VERSION}-x86_64-unknown-linux-musl"
      brew: brew install git-delta
    uninstall:
      debian: sudo dpkg -r git-delta
      arch: sudo pacman -R --noconfirm git-delta
      fedora: sudo dnf remove -y git-delta
      all: rm -f /usr/local/bin/delta
    check: delta --version
    description: "Diff con syntax highlighting para Git"
    enabled: true
    required: false
    source_url: https://github.com/dandavison/delta

  # =====================================================================
  # CLI TOOLS: DUF
  # =====================================================================
  - name: duf
    category: tools
    install:
      debian: sudo apt-get install -y duf
      arch: sudo pacman -S --noconfirm duf
      fedora: sudo dnf install -y duf
      alpine: |
        DUF_VERSION=$(curl -s https://api.github.com/repos/muesli/duf/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
        curl -sSLo /tmp/duf.tar.gz "https://github.com/muesli/duf/releases/download/v${DUF_VERSION}/duf_${DUF_VERSION}_linux_x86_64.tar.gz"
        tar xf /tmp/duf.tar.gz -C /tmp
        mv /tmp/duf /usr/local/bin/
        rm -rf /tmp/duf.tar.gz
      brew: brew install duf
    uninstall:
      debian: sudo apt-get remove -y duf
      arch: sudo pacman -R --noconfirm duf
      fedora: sudo dnf remove -y duf
      brew: brew uninstall duf
    check: duf --version
    description: "Reemplazo moderno de df (uso de disco)"
    enabled: true
    required: false
    source_url: https://github.com/muesli/duf

  # =====================================================================
  # CLI TOOLS: DUST
  # =====================================================================
  - name: dust
    category: tools
    install:
      arch: sudo pacman -S --noconfirm dust
      alpine: |
        DUST_VERSION=$(curl -s https://api.github.com/repos/bootandy/dust/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
        curl -sSLo /tmp/dust.tar.gz "https://github.com/bootandy/dust/releases/download/v${DUST_VERSION}/dust-v${DUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
        tar xf /tmp/dust.tar.gz -C /tmp
        mv "/tmp/dust-v${DUST_VERSION}-x86_64-unknown-linux-musl/dust" /usr/local/bin/
        rm -rf /tmp/dust.tar.gz "/tmp/dust-v${DUST_VERSION}-x86_64-unknown-linux-musl"
      brew: brew install dust
      fallback: cargo install du-dust
    uninstall:
      arch: sudo pacman -R --noconfirm dust
      all: rm -f /usr/local/bin/dust
    check: dust --version
    description: "Reemplazo moderno de du (uso de disco por directorio)"
    enabled: true
    required: false
    source_url: https://github.com/bootandy/dust

