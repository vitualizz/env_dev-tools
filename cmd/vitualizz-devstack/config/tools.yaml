  # =====================================================================
  # DOCKER: LAZYDOCKER
  # =====================================================================
  - name: lazydocker
    category: container
    depends_on: [docker]
    install:
      alpine: |
        LAZYDOCKER_VERSION=$(curl -s https://api.github.com/repos/jesseduffield/lazydocker/releases/latest | grep '"tag_name":' | cut -d'"' -f4 | tr -d 'v')
        curl -Lo /tmp/lazydocker.tar.gz "https://github.com/jesseduffield/lazydocker/releases/latest/download/lazydocker_${LAZYDOCKER_VERSION}_Linux_x86_64.tar.gz"
        tar xf /tmp/lazydocker.tar.gz -C /usr/local/bin lazydocker
        rm /tmp/lazydocker.tar.gz
      all: curl https://raw.githubusercontent.com/jesseduffield/lazydocker/master/scripts/install_update_linux.sh | bash
    uninstall:
      all: rm -f ~/.local/bin/lazydocker
    check: lazydocker --version
    description: "UI visual para Docker (TUI)"
    enabled: true
    required: false
    source_url: https://github.com/jesseduffield/lazydocker

  # =====================================================================
  # DOCKER FILES
  # =====================================================================
  - name: docker-filemanager
    category: container
    depends_on: [docker]
    install:
      all: |
        docker volume create portainer_data
        docker run -d --name portainer -p 9443:9443 --restart=always \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v portainer_data:/data \
          portainer/portainer-ce:latest
    uninstall:
      all: docker stop portainer && docker rm portainer && docker volume rm portainer_data
    check: docker ps --filter name=portainer
    description: "UI web para Docker (Portainer)"
    enabled: false
    required: false
    source_url: https://github.com/portainer/portainer
