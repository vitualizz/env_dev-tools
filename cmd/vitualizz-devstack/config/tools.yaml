        ONEFETCH_VERSION=$(curl -s https://api.github.com/repos/o2sh/onefetch/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
        curl -sSLo /tmp/onefetch.tar.gz "https://github.com/o2sh/onefetch/releases/download/${ONEFETCH_VERSION}/onefetch_${ONEFETCH_VERSION}_x86_64-unknown-linux-musl.tar.gz"
