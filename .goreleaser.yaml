version: 2

project_name: vitualizz-devstack

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: vitualizz-devstack
    main: ./cmd/vitualizz-devstack
    binary: vitualizz-devstack
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - binary
    files:
      - none*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Vitualizz DevStack {{ .Tag }}

    [![Downloads](https://img.shields.io/github/downloads/vitualizz/vitualizz-devstack/{{ .Tag }}/total)](https://github.com/vitualizz/vitualizz-devstack/releases)

    ### Quick Install
    ```bash
    curl -fsSL https://raw.githubusercontent.com/vitualizz/vitualizz-devstack/main/install.sh | sudo bash
    ```

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - Merge pull request
      - Merge branch
